<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  
  <!-- Fusion Engine Logo Elements -->
  <!-- Outer circle representing fusion -->
  <circle cx="16" cy="16" r="11" stroke="white" stroke-width="1.5" fill="none" opacity="0.9"/>
  
  <!-- Inner core representing engine -->
  <circle cx="16" cy="16" r="4" fill="#10B981"/>
  <circle cx="16" cy="16" r="2" fill="white"/>
  
  <!-- Fusion particles -->
  <circle cx="16" cy="7" r="1" fill="#10B981" opacity="0.8"/>
  <circle cx="25" cy="16" r="1" fill="#10B981" opacity="0.8"/>
  <circle cx="16" cy="25" r="1" fill="#10B981" opacity="0.8"/>
  <circle cx="7" cy="16" r="1" fill="#10B981" opacity="0.8"/>
  
  <!-- Energy lines -->
  <path d="M16,7 L16,11" stroke="white" stroke-width="0.8" opacity="0.6"/>
  <path d="M25,16 L21,16" stroke="white" stroke-width="0.8" opacity="0.6"/>
  <path d="M16,25 L16,21" stroke="white" stroke-width="0.8" opacity="0.6"/>
  <path d="M7,16 L11,16" stroke="white" stroke-width="0.8" opacity="0.6"/>
</svg>
