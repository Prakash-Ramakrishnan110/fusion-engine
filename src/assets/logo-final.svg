<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="200" height="50">
  <!-- FUSION text -->
  <text x="10" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#2563EB">
    FUSION
  </text>
  
  <!-- ENGINE text -->
  <text x="75" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#374151">
    ENGINE
  </text>
  
  <!-- Simple circular icon with cross design -->
  <g transform="translate(160, 12)">
    <!-- Outer circle -->
    <circle cx="12" cy="12" r="11" stroke="#2563EB" stroke-width="2" fill="none"/>
    <!-- Inner circle -->
    <circle cx="12" cy="12" r="3" fill="#10B981"/>
    <!-- Cross lines -->
    <line x1="12" y1="1" x2="12" y2="9" stroke="#2563EB" stroke-width="2"/>
    <line x1="23" y1="12" x2="15" y2="12" stroke="#2563EB" stroke-width="2"/>
    <line x1="12" y1="23" x2="12" y2="15" stroke="#2563EB" stroke-width="2"/>
    <line x1="1" y1="12" x2="9" y2="12" stroke="#2563EB" stroke-width="2"/>
  </g>
</svg>
