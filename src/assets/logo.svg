<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 40" width="180" height="40">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- FUSION text -->
  <text x="8" y="23" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" fill="url(#logoGradient)">
    FUSION
  </text>
  
  <!-- ENGINE text -->
  <text x="60" y="23" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" fill="#374151">
    ENGINE
  </text>
  
  <!-- TECHNOLOGY text -->
  <text x="8" y="33" font-family="Arial, sans-serif" font-size="6" font-weight="700" fill="#6B7280" letter-spacing="1">
    TECHNOLOGY
  </text>
  
  <!-- Startup rocket icon -->
  <g transform="translate(125, 8)">
    <path d="M12 4 L12 18 L8 14 L8 8 Z" fill="url(#accentGradient)" />
    <circle cx="10" cy="11" r="1.5" fill="#fff" />
    <path d="M4 11 L2 11 L2 9 L4 9 Z" fill="#3B82F6" />
    <path d="M4 13 L2 13 L2 11 L4 11 Z" fill="#1D4ED8" />
  </g>
  
  <!-- Subtle tech pattern -->
  <circle cx="145" cy="20" r="1" fill="#3B82F6" opacity="0.6" />
  <circle cx="150" cy="22" r="0.8" fill="#10B981" opacity="0.4" />
  <circle cx="155" cy="20" r="1" fill="#3B82F6" opacity="0.6" />
  <circle cx="160" cy="22" r="0.8" fill="#10B981" opacity="0.4" />
  <circle cx="165" cy="20" r="1" fill="#3B82F6" opacity="0.6" />
</svg>
