<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- FUSION text -->
  <text x="10" y="35" font-family="Arial Black, sans-serif" font-size="24" font-weight="900" fill="url(#logoGradient)">
    FUSION
  </text>
  
  <!-- ENGINE text -->
  <text x="85" y="35" font-family="Arial Black, sans-serif" font-size="24" font-weight="900" fill="#374151">
    ENGINE
  </text>
  
  <!-- TECHNOLOGY text -->
  <text x="10" y="50" font-family="Arial, sans-serif" font-size="8" font-weight="700" fill="#6B7280" letter-spacing="2">
    TECHNOLOGY
  </text>
  
  <!-- Startup rocket icon -->
  <g transform="translate(165, 15)">
    <path d="M15 5 L15 25 L10 20 L10 10 Z" fill="url(#accentGradient)" />
    <circle cx="12" cy="15" r="2" fill="#fff" />
    <path d="M5 15 L2 15 L2 12 L5 12 Z" fill="#3B82F6" />
    <path d="M5 18 L2 18 L2 15 L5 15 Z" fill="#1D4ED8" />
  </g>
  
  <!-- Subtle tech pattern -->
  <circle cx="170" cy="35" r="1.5" fill="#3B82F6" opacity="0.6" />
  <circle cx="175" cy="38" r="1" fill="#10B981" opacity="0.4" />
  <circle cx="180" cy="35" r="1.5" fill="#3B82F6" opacity="0.6" />
  <circle cx="185" cy="38" r="1" fill="#10B981" opacity="0.4" />
  <circle cx="190" cy="35" r="1.5" fill="#3B82F6" opacity="0.6" />
</svg>
