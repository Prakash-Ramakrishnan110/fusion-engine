<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 40" width="180" height="40">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Modern abstract shape behind text -->
  <rect x="5" y="8" width="110" height="24" rx="12" fill="url(#logoGradient)" opacity="0.1"/>
  
  <!-- FUSION text -->
  <text x="12" y="23" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" fill="url(#logoGradient)" filter="url(#glow)">
    FUSION
  </text>
  
  <!-- ENGINE text -->
  <text x="64" y="23" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" fill="#374151">
    ENGINE
  </text>
  
  <!-- TECHNOLOGY text -->
  <text x="12" y="33" font-family="Arial, sans-serif" font-size="6" font-weight="700" fill="#6B7280" letter-spacing="1">
    TECHNOLOGY
  </text>
  
  <!-- Modern tech icon - simplified circuit pattern -->
  <g transform="translate(135, 12)">
    <!-- Circuit lines -->
    <path d="M0 8 L8 8 L8 4 L12 4" stroke="url(#accentGradient)" stroke-width="1.5" fill="none"/>
    <path d="M0 12 L8 12 L8 16 L12 16" stroke="#3B82F6" stroke-width="1.5" fill="none"/>
    <!-- Connection points -->
    <circle cx="0" cy="8" r="2" fill="url(#accentGradient)"/>
    <circle cx="0" cy="12" r="2" fill="#3B82F6"/>
    <circle cx="8" cy="8" r="1.5" fill="#10B981"/>
    <circle cx="8" cy="12" r="1.5" fill="#1D4ED8"/>
    <circle cx="12" cy="4" r="1" fill="#10B981"/>
    <circle cx="12" cy="16" r="1" fill="#3B82F6"/>
  </g>
  
  <!-- Subtle tech dots -->
  <circle cx="155" cy="15" r="1" fill="#3B82F6" opacity="0.4"/>
  <circle cx="160" cy="20" r="1.2" fill="#10B981" opacity="0.5"/>
  <circle cx="165" cy="18" r="0.8" fill="#3B82F6" opacity="0.3"/>
  <circle cx="170" cy="22" r="1" fill="#10B981" opacity="0.4"/>
</svg>
